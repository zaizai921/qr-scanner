<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>二维码扫描</title>
    <script src="https://unpkg.com/@zxing/browser@0.1.1/umd/index.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
        }
        .container { 
            background: white; 
            padding: 40px 30px; 
            border-radius: 20px; 
            width: 100%; 
            max-width: 400px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.3); 
        }
        h2 { text-align: center; margin-bottom: 30px; color: #333; font-size: 22px; }
        .input-group { margin-bottom: 25px; }
        label { display: block; margin-bottom: 8px; color: #666; font-size: 14px; font-weight: 500; }
        .input-wrapper { position: relative; }
        input { 
            width: 100%; 
            padding: 14px 50px 14px 15px; 
            border: 2px solid #e0e0e0; 
            border-radius: 12px; 
            font-size: 16px; 
        }
        .scan-btn { 
            position: absolute; 
            right: 8px; 
            top: 50%; 
            transform: translateY(-50%); 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            border: none; 
            width: 38px; 
            height: 38px; 
            border-radius: 10px; 
            cursor: pointer; 
            display: none; 
            align-items: center; 
            justify-content: center;
        }
        .scan-btn svg { width: 22px; height: 22px; fill: white; }
        @media (pointer: coarse) { .scan-btn { display: flex; } }
        
        .modal { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: #000; 
            z-index: 9999; 
            flex-direction: column;
        }
        .modal.active { display: flex; }
        .modal-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 12px 15px; 
            background: rgba(0,0,0,0.9);
            z-index: 100;
        }
        .modal-title { color: white; font-size: 15px; }
        .close-btn { 
            background: rgba(255,255,255,0.2); 
            border: none; 
            color: white; 
            width: 32px; height: 32px; 
            border-radius: 50%; 
            font-size: 20px; 
            cursor: pointer;
        }
        
        #reader { 
            flex: 1; 
            position: relative; 
            overflow: hidden;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover;
        }
        
        .scan-frame { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            width: 260px; 
            height: 260px; 
            border: 3px solid #00ff00; 
            border-radius: 15px; 
            pointer-events: none;
            z-index: 50;
            box-shadow: 0 0 0 9999px rgba(0,0,0,0.5);
        }
        
        .corner { 
            position: absolute; 
            width: 25px; 
            height: 25px; 
            border-color: #00ff00; 
            border-style: solid; 
            border-width: 0;
        }
        .corner-tl { top: -3px; left: -3px; border-top-width: 4px; border-left-width: 4px; border-radius: 12px 0 0 0; }
        .corner-tr { top: -3px; right: -3px; border-top-width: 4px; border-right-width: 4px; border-radius: 0 12px 0 0; }
        .corner-bl { bottom: -3px; left: -3px; border-bottom-width: 4px; border-left-width: 4px; border-radius: 0 0 0 12px; }
        .corner-br { bottom: -3px; right: -3px; border-bottom-width: 4px; border-right-width: 4px; border-radius: 0 0 12px 0; }
        
        .scan-line { 
            position: absolute; 
            width: 100%; 
            height: 2px; 
            background: #00ff00; 
            box-shadow: 0 0 10px #00ff00; 
            animation: scan 2s linear infinite;
        }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        
        .debug-panel {
            position: absolute;
            top: 60px;
            left: 10px;
            right: 10px;
            background: rgba(0,0,0,0.85);
            color: #0f0;
            padding: 10px;
            font-size: 12px;
            font-family: monospace;
            border-radius: 8px;
            z-index: 200;
            max-height: 100px;
            overflow-y: auto;
        }
        
        .result-panel {
            position: absolute;
            bottom: 80px;
            left: 10px;
            right: 10px;
            background: rgba(0,255,0,0.95);
            color: black;
            padding: 15px;
            border-radius: 10px;
            z-index: 200;
            display: none;
            word-break: break-all;
            font-size: 14px;
            font-weight: bold;
        }
        .result-panel.show { display: block; }
        
        .scan-tip { 
            position: absolute; 
            bottom: 20px; 
            left: 0; 
            right: 0; 
            text-align: center; 
            color: rgba(255,255,255,0.8); 
            font-size: 14px;
            z-index: 50;
        }
        
        .loading { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            color: white; 
            text-align: center;
            z-index: 60;
        }
        .spinner { 
            width: 40px; height: 40px; 
            border: 3px solid rgba(255,255,255,0.3); 
            border-top-color: #00ff00; 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
            margin: 0 auto 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h2>刘旭让AI写的鹅鹅鹅  🔍 二维码扫描</h2>
        <div class="input-group">
            <label>扫描结果</label>
            <div class="input-wrapper">
                <input type="text" id="resultInput" placeholder="点击相机图标开始扫码" readonly>
                <button class="scan-btn" id="scanBtn">
                    <svg viewBox="0 0 24 24">
                        <path d="M9.5 6.5v-2a1 1 0 0 0-1-1h-2a1 1 0 0 0-1 1v2a1 1 0 0 0 1 1h2a1 1 0 0 0 1-1zm0 13v-2a1 1 0 0 0-1-1h-2a1 1 0 0 0-1 1v2a1 1 0 0 0 1 1h2a1 1 0 0 0 1-1zm10-13v-2a1 1 0 0 0-1-1h-2a1 1 0 0 0-1 1v2a1 1 0 0 0 1 1h2a1 1 0 0 0 1-1zm0 13v-2a1 1 0 0 0-1-1h-2a1 1 0 0 0-1 1v2a1 1 0 0 0 1 1h2a1 1 0 0 0 1-1zM3 7h3V5H3a2 2 0 0 0-2 2v3h2V7zm0 10v-3H1v3a2 2 0 0 0 2 2h3v-2H3zm17-10V5h-3v2h3v3h2V7a2 2 0 0 0-2-2zm0 10h-3v2h3a2 2 0 0 0 2-2v-3h-2v3z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <div class="modal" id="scanModal">
        <div class="modal-header">
            <span class="modal-title">二维码扫描 - ZXing引擎</span>
            <button class="close-btn" id="closeBtn">×</button>
        </div>
        
        <div id="reader">
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <div>启动中...</div>
            </div>
            <video id="video" autoplay playsinline muted></video>
        </div>
        
        <div class="debug-panel" id="debugPanel">等待启动...</div>
        
        <div class="result-panel" id="resultPanel">
            <div id="resultContent"></div>
        </div>
        
        <div class="scan-frame">
            <div class="corner corner-tl"></div>
            <div class="corner corner-tr"></div>
            <div class="corner corner-bl"></div>
            <div class="corner corner-br"></div>
            <div class="scan-line"></div>
        </div>
        
        <div class="scan-tip">将二维码放入绿色框内</div>
    </div>

    <script>
        const { BrowserQRCodeReader } = window.ZXingBrowser;
        
        const scanBtn = document.getElementById('scanBtn');
        const scanModal = document.getElementById('scanModal');
        const closeBtn = document.getElementById('closeBtn');
        const resultInput = document.getElementById('resultInput');
        const loading = document.getElementById('loading');
        const debugPanel = document.getElementById('debugPanel');
        const resultPanel = document.getElementById('resultPanel');
        const resultContent = document.getElementById('resultContent');
        const video = document.getElementById('video');

        let codeReader = null;
        let isScanning = false;
        let scanCount = 0;

        function log(msg) {
            const time = new Date().toLocaleTimeString();
            debugPanel.innerHTML = `[${time}] ${msg}<br>` + debugPanel.innerHTML;
            const lines = debugPanel.innerHTML.split('<br>');
            if (lines.length > 8) {
                debugPanel.innerHTML = lines.slice(0, 8).join('<br>');
            }
        }

        async function startScan() {
            scanModal.classList.add('active');
            loading.style.display = 'block';
            debugPanel.innerHTML = '初始化ZXing引擎...';
            resultPanel.classList.remove('show');
            scanCount = 0;

            try {
                codeReader = new BrowserQRCodeReader();
                
                // 获取视频流
                log('请求摄像头权限...');
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'environment',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                });
                
                video.srcObject = stream;
                await video.play();
                
                loading.style.display = 'none';
                log('✓ 摄像头已启动');
                
                isScanning = true;
                
                // 开始持续扫描
                scanLoop();
                
            } catch (err) {
                log('✗ 错误: ' + err.message);
                loading.style.display = 'none';
                alert('启动失败: ' + err.message);
            }
        }

        async function scanLoop() {
            if (!isScanning) return;
            
            try {
                scanCount++;
                if (scanCount % 10 === 0) {
                    log(`扫描中...(${scanCount})`);
                }
                
                // 从视频流解码
                const result = await codeReader.decodeFromVideoElement(video);
                
                if (result) {
                    const text = result.getText();
                    log('✓ 识别成功: ' + text.substring(0, 20));
                    
                    resultContent.textContent = text;
                    resultPanel.classList.add('show');
                    resultInput.value = text;
                    
                    if (navigator.vibrate) navigator.vibrate(200);
                    
                    // 停止扫描
                    setTimeout(() => {
                        closeScan();
                    }, 2000);
                    return;
                }
                
            } catch (err) {
                // 解码失败是正常现象，继续扫描
            }
            
            // 继续下一帧
            if (isScanning) {
                requestAnimationFrame(scanLoop);
            }
        }

        function closeScan() {
            isScanning = false;
            scanModal.classList.remove('active');
            resultPanel.classList.remove('show');
            
            // 停止视频流
            if (video.srcObject) {
                const tracks = video.srcObject.getTracks();
                tracks.forEach(track => track.stop());
                video.srcObject = null;
            }
            
            scanCount = 0;
        }

        scanBtn.addEventListener('click', startScan);
        closeBtn.addEventListener('click', closeScan);

        document.addEventListener('visibilitychange', () => {
            if (document.hidden && isScanning) {
                closeScan();
            }
        });
    </script>
</body>
</html>
