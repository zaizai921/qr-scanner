<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文字飘落效果</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=ZCOOL+KuaiLe&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            background-color: #0f172a;
            font-family: 'ZCOOL KuaiLe', cursive;
        }

        /* 背景动画 - 深邃星空感 */
        .bg-animated {
            background: linear-gradient(180deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        /* 飘落文字的基础样式 */
        .falling-text {
            position: absolute;
            top: -50px; /* 从屏幕上方外开始 */
            color: rgba(255, 255, 255, 0.8);
            pointer-events: none; /* 不阻挡鼠标事件 */
            user-select: none;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
            will-change: transform, opacity;
        }

        /* 关键帧动画：下落 + 摇摆 */
        @keyframes fall {
            0% {
                transform: translateY(0) rotate(0deg) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(110vh) rotate(var(--rotation-end)) translateX(var(--sway-end));
                opacity: 0;
            }
        }

        /* 摇摆动画辅助 */
        @keyframes sway {
            0% { margin-left: 0; }
            50% { margin-left: 50px; }
            100% { margin-left: 0; }
        }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden">

    <!-- 背景层 -->
    <div class="bg-animated"></div>

    <!-- 控制面板 (可选，增加互动性) -->
    <div class="absolute top-4 left-4 z-50 bg-slate-800/80 backdrop-blur-sm p-4 rounded-lg border border-slate-600 shadow-xl text-white">
        <h1 class="text-lg font-bold mb-2 text-pink-400">✨ 文字飘落特效</h1>
        <div class="flex flex-col gap-2 text-sm text-slate-300">
            <p>密度: <span id="density-display">中</span></p>
            <input type="range" min="50" max="500" value="200" class="w-32 accent-pink-500" id="speed-control">
            <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" id="chaos-mode" class="accent-pink-500">
                <span>混沌模式 (疯狂旋转)</span>
            </label>
        </div>
    </div>

    <!-- 容器 -->
    <div id="scene" class="relative w-full h-full"></div>

    <script>
        const scene = document.getElementById('scene');
        const speedControl = document.getElementById('speed-control');
        const chaosMode = document.getElementById('chaos-mode');
        
        // 配置参数
        const TEXT_CONTENT = "付梓沫吃屎";
        const COLORS = [
            '#ffffff', // 白
            '#fca5a5', // 浅红
            '#fdba74', // 橙
            '#86efac', // 绿
            '#93c5fd', // 蓝
            '#c4b5fd', // 紫
            '#f0abfc'  // 粉
        ];
        
        let spawnRate = 200; // 生成间隔 ms
        let isChaos = false;

        // 监听控制面板
        speedControl.addEventListener('input', (e) => {
            // 值越小，生成越快（间隔越小）
            // 反转逻辑：滑块值越大，间隔越小
            spawnRate = 550 - parseInt(e.target.value);
            document.getElementById('density-display').innerText = spawnRate < 100 ? "高" : (spawnRate > 300 ? "低" : "中");
        });

        chaosMode.addEventListener('change', (e) => {
            isChaos = e.target.checked;
        });

        function createParticle() {
            const el = document.createElement('div');
            el.classList.add('falling-text');
            el.innerText = TEXT_CONTENT;

            // 随机属性设置
            const startLeft = Math.random() * 100; // 0% 到 100%
            const duration = Math.random() * 3 + 2; // 2秒 到 5秒 下落时间
            const size = Math.random() * 10 + 10; // 10px 到 20px
            const color = COLORS[Math.floor(Math.random() * COLORS.length)];
            
            // 旋转角度：东倒西歪的关键
            // 正常模式：-30度 到 30度
            // 混沌模式：-360度 到 360度
            const rotStart = isChaos ? (Math.random() * 720 - 360) : (Math.random() * 60 - 30);
            const rotEnd = isChaos ? (Math.random() * 1440 - 720) : (rotStart + (Math.random() * 60 - 30));
            
            // 左右摇摆幅度
            const swayAmount = Math.random() * 100 - 50; 

            // 应用样式
            el.style.left = `${startLeft}%`;
            el.style.fontSize = `${size}px`;
            el.style.color = color;
            el.style.animation = `fall ${duration}s linear forwards`;
            
            // CSS 变量用于动画关键帧
            el.style.setProperty('--rotation-end', `${rotEnd}deg`);
            el.style.setProperty('--sway-end', `${swayAmount}px`);
            el.style.transform = `rotate(${rotStart}deg)`;

            // 随机透明度变化
            el.style.opacity = Math.random() * 0.5 + 0.5;

            scene.appendChild(el);

            // 动画结束后清理 DOM
            setTimeout(() => {
                el.remove();
            }, duration * 1000);
        }

        // 循环生成
        let lastTime = 0;
        function loop(timestamp) {
            if (timestamp - lastTime > spawnRate) {
                createParticle();
                // 密度高的时候一次生成多个
                if (spawnRate < 100 && Math.random() > 0.5) {
                    setTimeout(createParticle, 50);
                }
                lastTime = timestamp;
            }
            requestAnimationFrame(loop);
        }

        // 启动
        requestAnimationFrame(loop);

        // 初始爆发，让屏幕一开始就有内容
        for(let i=0; i<20; i++) {
            setTimeout(createParticle, i * 50);
        }

    </script>
</body>
</html>
