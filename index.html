<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>二维码扫描</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
        }
        .container { 
            background: white; 
            padding: 40px 30px; 
            border-radius: 20px; 
            width: 100%; 
            max-width: 400px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.3); 
        }
        h2 { 
            text-align: center; 
            margin-bottom: 30px; 
            color: #333; 
            font-size: 22px;
        }
        .input-group { margin-bottom: 25px; }
        label { 
            display: block; 
            margin-bottom: 8px; 
            color: #666; 
            font-size: 14px; 
            font-weight: 500;
        }
        .input-wrapper { position: relative; }
        input { 
            width: 100%; 
            padding: 14px 50px 14px 15px; 
            border: 2px solid #e0e0e0; 
            border-radius: 12px; 
            font-size: 16px; 
            transition: all 0.3s;
        }
        input:focus { 
            outline: none; 
            border-color: #667eea; 
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        .scan-btn { 
            position: absolute; 
            right: 8px; 
            top: 50%; 
            transform: translateY(-50%); 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            border: none; 
            width: 38px; 
            height: 38px; 
            border-radius: 10px; 
            cursor: pointer; 
            display: none; 
            align-items: center; 
            justify-content: center;
            box-shadow: 0 4px 15px rgba(102,126,234,0.4);
        }
        .scan-btn svg { width: 22px; height: 22px; fill: white; }
        
        @media (pointer: coarse) {
            .scan-btn { display: flex; }
        }
        
        .tips { 
            margin-top: 20px; 
            padding: 15px; 
            background: #f8f9fa; 
            border-radius: 10px; 
            font-size: 13px; 
            color: #666; 
            line-height: 1.6;
        }

        .modal { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: #000; 
            z-index: 9999; 
            flex-direction: column;
        }
        .modal.active { display: flex; }
        .modal-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 20px; 
            background: rgba(0,0,0,0.8);
        }
        .modal-title { color: white; font-size: 16px; }
        .close-btn { 
            background: rgba(255,255,255,0.2); 
            border: none; 
            color: white; 
            width: 36px; height: 36px; 
            border-radius: 50%; 
            font-size: 22px; 
            cursor: pointer;
        }
        #reader { 
            flex: 1; 
            position: relative; 
            overflow: hidden;
            background: #000;
        }
        /* 优化视频清晰度 */
        #reader video { 
            width: 100% !important; 
            height: 100% !important; 
            object-fit: cover;
            /* 提高清晰度 */
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
        }
        .scan-frame { 
            position: absolute; 
            top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            width: 280px; height: 280px; 
            border: 2px solid rgba(255,255,255,0.3); 
            border-radius: 20px; 
            pointer-events: none;
            z-index: 10;
        }
        .corner { 
            position: absolute; 
            width: 25px; height: 25px; 
            border-color: #00ff00; 
            border-style: solid; 
            border-width: 0;
        }
        .corner-tl { top: -2px; left: -2px; border-top-width: 4px; border-left-width: 4px; border-radius: 15px 0 0 0; }
        .corner-tr { top: -2px; right: -2px; border-top-width: 4px; border-right-width: 4px; border-radius: 0 15px 0 0; }
        .corner-bl { bottom: -2px; left: -2px; border-bottom-width: 4px; border-left-width: 4px; border-radius: 0 0 0 15px; }
        .corner-br { bottom: -2px; right: -2px; border-bottom-width: 4px; border-right-width: 4px; border-radius: 0 0 15px 0; }
        .scan-line { 
            position: absolute; 
            width: 100%; height: 3px; 
            background: linear-gradient(to right, transparent, #00ff00, transparent); 
            box-shadow: 0 0 10px #00ff00; 
            animation: scan 2.5s linear infinite;
        }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        .scan-tip { 
            position: absolute; 
            bottom: 80px; 
            left: 0; right: 0; 
            text-align: center; 
            color: rgba(255,255,255,0.9); 
            font-size: 14px;
            z-index: 10;
        }
        .loading { 
            position: absolute; 
            top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            color: white; 
            text-align: center;
            z-index: 5;
        }
        .spinner { 
            width: 50px; height: 50px; 
            border: 4px solid rgba(255,255,255,0.3); 
            border-top-color: #667eea; 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
            margin: 0 auto 15px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* 调试信息面板 */
        .debug-info {
            position: absolute;
            top: 60px;
            left: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: #0f0;
            padding: 10px;
            font-size: 12px;
            font-family: monospace;
            border-radius: 8px;
            z-index: 20;
            max-height: 100px;
            overflow-y: auto;
            display: none;
        }
        .debug-info.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
<h1>刘旭瞎搞着玩的</h1>

        <h2>🔍 二维码扫描</h2>
        
        <div class="input-group">
            <label>扫描结果</label>
            <div class="input-wrapper">
                <input type="text" id="resultInput" placeholder="点击相机图标开始扫码" readonly>
                <button class="scan-btn" id="scanBtn">
                    <svg viewBox="0 0 24 24">
                        <path d="M9.5 6.5v-2a1 1 0 0 0-1-1h-2a1 1 0 0 0-1 1v2a1 1 0 0 0 1 1h2a1 1 0 0 0 1-1zm0 13v-2a1 1 0 0 0-1-1h-2a1 1 0 0 0-1 1v2a1 1 0 0 0 1 1h2a1 1 0 0 0 1-1zm10-13v-2a1 1 0 0 0-1-1h-2a1 1 0 0 0-1 1v2a1 1 0 0 0 1 1h2a1 1 0 0 0 1-1zm0 13v-2a1 1 0 0 0-1-1h-2a1 1 0 0 0-1 1v2a1 1 0 0 0 1 1h2a1 1 0 0 0 1-1zM3 7h3V5H3a2 2 0 0 0-2 2v3h2V7zm0 10v-3H1v3a2 2 0 0 0 2 2h3v-2H3zm17-10V5h-3v2h3v3h2V7a2 2 0 0 0-2-2zm0 10h-3v2h3a2 2 0 0 0 2-2v-3h-2v3z"/>
                    </svg>
                </button>
            </div>
        </div>

        <div class="tips">
            <strong>💡 使用提示：</strong><br>
            • 点击相机图标调起摄像头<br>
            • 将二维码对准绿色框内<br>
            • 识别成功会弹出内容提示<br>
            • 如相机模糊，请擦拭镜头或调整光线
        </div>
    </div>

    <div class="modal" id="scanModal">
        <div class="modal-header">
            <span class="modal-title">将二维码放入绿色框内</span>
            <button class="close-btn" id="closeBtn">×</button>
        </div>
        <div id="reader">
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <div>正在启动摄像头...</div>
            </div>
        </div>
        <div class="debug-info" id="debugInfo"></div>
        <div class="scan-frame">
            <div class="corner corner-tl"></div>
            <div class="corner corner-tr"></div>
            <div class="corner corner-bl"></div>
            <div class="corner corner-br"></div>
            <div class="scan-line"></div>
        </div>
        <div class="scan-tip">自动识别中...请保持稳定</div>
    </div>

    <script>
        const scanBtn = document.getElementById('scanBtn');
        const scanModal = document.getElementById('scanModal');
        const closeBtn = document.getElementById('closeBtn');
        const resultInput = document.getElementById('resultInput');
        const loading = document.getElementById('loading');
        const debugInfo = document.getElementById('debugInfo');

        let html5QrCode = null;
        let isScanning = false;
        let scanCount = 0;

        // 调试日志
        function log(msg) {
            console.log(msg);
            debugInfo.innerHTML += '<div>' + new Date().toLocaleTimeString() + ' - ' + msg + '</div>';
            debugInfo.scrollTop = debugInfo.scrollHeight;
        }

        async function startScan() {
            scanModal.classList.add('active');
            // 双击标题栏显示调试信息
            document.querySelector('.modal-title').addEventListener('dblclick', () => {
                debugInfo.classList.toggle('active');
            });
            
            loading.style.display = 'block';

            try {
                const cameras = await Html5Qrcode.getCameras();
                log('找到 ' + cameras.length + ' 个摄像头');

                if (cameras.length === 0) {
                    throw new Error('未找到摄像头');
                }

                // 优先选择后置摄像头
                let selectedCamera = cameras.find(c => 
                    c.label.toLowerCase().includes('back') || 
                    c.label.toLowerCase().includes('后置') ||
                    c.label.toLowerCase().includes('environment') ||
                    c.label.toLowerCase().includes('rear')
                ) || cameras[cameras.length - 1];

                log('使用摄像头: ' + selectedCamera.label);

                html5QrCode = new Html5Qrcode("reader");

                // 优化配置：提高清晰度配置
                const config = {
                    fps: 15, // 提高帧率
                    qrbox: { width: 260, height: 260 },
                    aspectRatio: 1.0,
                    // 支持多种条码格式
                    formatsToSupport: [
                        Html5QrcodeSupportedFormats.QR_CODE,
                        Html5QrcodeSupportedFormats.CODE_128,
                        Html5QrcodeSupportedFormats.CODE_39,
                        Html5QrcodeSupportedFormats.EAN_13,
                        Html5QrcodeSupportedFormats.EAN_8,
                        Html5QrcodeSupportedFormats.UPC_A,
                        Html5QrcodeSupportedFormats.UPC_E
                    ],
                    // 视频配置：提高分辨率
                    videoConstraints: {
                        width: { min: 640, ideal: 1280, max: 1920 },
                        height: { min: 480, ideal: 720, max: 1080 },
                        facingMode: "environment"
                    }
                };

                await html5QrCode.start(
                    selectedCamera.id,
                    config,
                    onSuccess,
                    onError
                );

                isScanning = true;
                loading.style.display = 'none';
                log('摄像头启动成功');

            } catch (err) {
                log('启动失败: ' + err.message);
                loading.style.display = 'none';
                
                // 备用方案
                try {
                    log('尝试备用方案...');
                    html5QrCode = new Html5Qrcode("reader");
                    await html5QrCode.start(
                        { facingMode: "environment" },
                        { 
                            fps: 15, 
                            qrbox: 260,
                            videoConstraints: {
                                width: { ideal: 1280 },
                                height: { ideal: 720 }
                            }
                        },
                        onSuccess,
                        onError
                    );
                    isScanning = true;
                    loading.style.display = 'none';
                    log('备用方案启动成功');
                } catch (err2) {
                    alert('摄像头启动失败: ' + (err2.message || '请检查权限'));
                    closeScan();
                }
            }
        }

        function onSuccess(decodedText, decodedResult) {
            scanCount++;
            log('第 ' + scanCount + ' 次识别: ' + decodedText.substring(0, 50));
            
            // 填充输入框
            resultInput.value = decodedText;
            
            // 强制 alert 显示结果
            alert('识别成功！内容：\n\n' + decodedText + '\n\n长度：' + decodedText.length + ' 字符');
            
            // 震动反馈
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            
            // 停止扫描
            setTimeout(() => {
                closeScan();
            }, 500);
        }

        function onError(errorMessage) {
            // 静默处理，但每10次记录一次避免刷屏
            if (scanCount % 10 === 0) {
                log('扫描中...（未识别）');
            }
        }

        async function closeScan() {
            scanModal.classList.remove('active');
            debugInfo.classList.remove('active');
            debugInfo.innerHTML = '';
            
            if (html5QrCode && isScanning) {
                try {
                    await html5QrCode.stop();
                    html5QrCode.clear();
                    log('摄像头已停止');
                } catch (e) {}
                isScanning = false;
            }
            scanCount = 0;
        }

        scanBtn.addEventListener('click', startScan);
        closeBtn.addEventListener('click', closeScan);
        
        scanModal.addEventListener('click', (e) => {
            if (e.target === scanModal) closeScan();
        });

        // 防止页面隐藏时继续扫描
        document.addEventListener('visibilitychange', () => {
            if (document.hidden && isScanning) {
                closeScan();
            }
        });
    </script>
</body>
</html>
