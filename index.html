<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>二维码扫描</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
        }
        .container { 
            background: white; 
            padding: 40px 30px; 
            border-radius: 20px; 
            width: 100%; 
            max-width: 400px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.3); 
        }
        h2 { 
            text-align: center; 
            margin-bottom: 30px; 
            color: #333; 
            font-size: 22px;
        }
        .input-group { margin-bottom: 25px; }
        label { 
            display: block; 
            margin-bottom: 8px; 
            color: #666; 
            font-size: 14px; 
            font-weight: 500;
        }
        .input-wrapper { position: relative; }
        input { 
            width: 100%; 
            padding: 14px 50px 14px 15px; 
            border: 2px solid #e0e0e0; 
            border-radius: 12px; 
            font-size: 16px; 
            transition: all 0.3s;
        }
        input:focus { 
            outline: none; 
            border-color: #667eea; 
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        .scan-btn { 
            position: absolute; 
            right: 8px; 
            top: 50%; 
            transform: translateY(-50%); 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            border: none; 
            width: 38px; 
            height: 38px; 
            border-radius: 10px; 
            cursor: pointer; 
            display: none; 
            align-items: center; 
            justify-content: center;
            box-shadow: 0 4px 15px rgba(102,126,234,0.4);
        }
        .scan-btn svg { width: 22px; height: 22px; fill: white; }
        
        @media (pointer: coarse) {
            .scan-btn { display: flex; }
        }
        
        .tips { 
            margin-top: 20px; 
            padding: 15px; 
            background: #f8f9fa; 
            border-radius: 10px; 
            font-size: 13px; 
            color: #666; 
            line-height: 1.6;
        }

        .modal { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: #000; 
            z-index: 9999; 
            flex-direction: column;
        }
        .modal.active { display: flex; }
        .modal-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 20px; 
            background: rgba(0,0,0,0.8);
            z-index: 100;
        }
        .modal-title { color: white; font-size: 16px; }
        .close-btn { 
            background: rgba(255,255,255,0.2); 
            border: none; 
            color: white; 
            width: 36px; height: 36px; 
            border-radius: 50%; 
            font-size: 22px; 
            cursor: pointer;
        }
        
        /* 相机容器 */
        #reader { 
            flex: 1; 
            position: relative; 
            overflow: hidden;
            background: #000;
        }
        
        /* 隐藏 html5-qrcode 自带的扫描框 */
        #reader video { 
            width: 100% !important; 
            height: 100% !important; 
            object-fit: cover;
        }
        
        /* 强制隐藏库自带的扫描框和文字 */
        #reader__scan_region {
            background: transparent !important;
        }
        #reader__scan_region img {
            display: none !important;
        }
        #reader__dashboard {
            display: none !important;
        }
        #reader__status_span {
            display: none !important;
        }
        #reader__camera_permission_button {
            display: none !important;
        }
        #reader__camera_scan_region {
            background: transparent !important;
            border: none !important;
        }
        
        /* 自定义扫描框 - 唯一可见的框 */
        .custom-scan-frame { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            width: 280px; 
            height: 280px; 
            border: 3px solid #00ff00; 
            border-radius: 20px; 
            pointer-events: none;
            z-index: 50;
            box-shadow: 0 0 0 9999px rgba(0,0,0,0.4);
        }
        
        .corner { 
            position: absolute; 
            width: 30px; 
            height: 30px; 
            border-color: #00ff00; 
            border-style: solid; 
            border-width: 0;
        }
        .corner-tl { top: -3px; left: -3px; border-top-width: 5px; border-left-width: 5px; border-radius: 15px 0 0 0; }
        .corner-tr { top: -3px; right: -3px; border-top-width: 5px; border-right-width: 5px; border-radius: 0 15px 0 0; }
        .corner-bl { bottom: -3px; left: -3px; border-bottom-width: 5px; border-left-width: 5px; border-radius: 0 0 0 15px; }
        .corner-br { bottom: -3px; right: -3px; border-bottom-width: 5px; border-right-width: 5px; border-radius: 0 0 15px 0; }
        
        .scan-line { 
            position: absolute; 
            width: 100%; 
            height: 3px; 
            background: linear-gradient(to right, transparent, #00ff00, transparent); 
            box-shadow: 0 0 15px #00ff00, 0 0 30px #00ff00; 
            animation: scan 2s linear infinite;
        }
        
        @keyframes scan { 
            0% { top: 0; opacity: 0; } 
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; } 
        }
        
        .scan-tip { 
            position: absolute; 
            bottom: 100px; 
            left: 0; 
            right: 0; 
            text-align: center; 
            color: white; 
            font-size: 16px;
            font-weight: 500;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            z-index: 50;
        }
        
        .loading { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            color: white; 
            text-align: center;
            z-index: 60;
        }
        .spinner { 
            width: 50px; 
            height: 50px; 
            border: 4px solid rgba(255,255,255,0.3); 
            border-top-color: #00ff00; 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
            margin: 0 auto 15px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* 识别状态提示 */
        .status-toast {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,255,0,0.9);
            color: black;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            display: none;
            z-index: 100;
        }
        .status-toast.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>刘旭瞎搞着玩的hhhh  🔍 二维码扫描</h2>
        
        <div class="input-group">
            <label>扫描结果</label>
            <div class="input-wrapper">
                <input type="text" id="resultInput" placeholder="点击相机图标开始扫码" readonly>
                <button class="scan-btn" id="scanBtn">
                    <svg viewBox="0 0 24 24">
                        <path d="M9.5 6.5v-2a1 1 0 0 0-1-1h-2a1 1 0 0 0-1 1v2a1 1 0 0 0 1 1h2a1 1 0 0 0 1-1zm0 13v-2a1 1 0 0 0-1-1h-2a1 1 0 0 0-1 1v2a1 1 0 0 0 1 1h2a1 1 0 0 0 1-1zm10-13v-2a1 1 0 0 0-1-1h-2a1 1 0 0 0-1 1v2a1 1 0 0 0 1 1h2a1 1 0 0 0 1-1zm0 13v-2a1 1 0 0 0-1-1h-2a1 1 0 0 0-1 1v2a1 1 0 0 0 1 1h2a1 1 0 0 0 1-1zM3 7h3V5H3a2 2 0 0 0-2 2v3h2V7zm0 10v-3H1v3a2 2 0 0 0 2 2h3v-2H3zm17-10V5h-3v2h3v3h2V7a2 2 0 0 0-2-2zm0 10h-3v2h3a2 2 0 0 0 2-2v-3h-2v3z"/>
                    </svg>
                </button>
            </div>
        </div>

        <div class="tips">
            <strong>💡 使用提示：</strong><br>
            • 点击相机图标调起摄像头<br>
            • 将二维码对准绿色扫描框内<br>
            • 保持二维码清晰、光线充足<br>
            • 距离建议 10-20 厘米
        </div>
    </div>

    <div class="modal" id="scanModal">
        <div class="modal-header">
            <span class="modal-title">将二维码放入框内扫描</span>
            <button class="close-btn" id="closeBtn">×</button>
        </div>
        
        <div id="reader">
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <div>正在启动摄像头...</div>
            </div>
        </div>
        
        <!-- 唯一的自定义扫描框 -->
        <div class="custom-scan-frame" id="scanFrame">
            <div class="corner corner-tl"></div>
            <div class="corner corner-tr"></div>
            <div class="corner corner-bl"></div>
            <div class="corner corner-br"></div>
            <div class="scan-line"></div>
        </div>
        
        <div class="scan-tip">对准二维码自动识别</div>
        <div class="status-toast" id="statusToast">✓ 识别成功</div>
    </div>

    <script>
        const scanBtn = document.getElementById('scanBtn');
        const scanModal = document.getElementById('scanModal');
        const closeBtn = document.getElementById('closeBtn');
        const resultInput = document.getElementById('resultInput');
        const loading = document.getElementById('loading');
        const statusToast = document.getElementById('statusToast');

        let html5QrCode = null;
        let isScanning = false;
        let lastResult = '';

        async function startScan() {
            scanModal.classList.add('active');
            loading.style.display = 'block';

            try {
                const cameras = await Html5Qrcode.getCameras();
                console.log('找到摄像头:', cameras);

                if (cameras.length === 0) {
                    throw new Error('未找到摄像头');
                }

                // 选择后置摄像头
                let selectedCamera = cameras.find(c => 
                    c.label.toLowerCase().includes('back') || 
                    c.label.toLowerCase().includes('后置') ||
                    c.label.toLowerCase().includes('environment')
                ) || cameras[cameras.length - 1];

                html5QrCode = new Html5Qrcode("reader");

                // 关键配置：禁用库自带的 UI，使用纯视频流
                const config = {
                    fps: 10,
                    qrbox: null, // 禁用自带的扫描框
                    aspectRatio: 1.0,
                    disableFlip: false,
                    // 视频约束：强制高清
                    videoConstraints: {
                        facingMode: { exact: "environment" },
                        width: { min: 640, ideal: 1920, max: 1920 },
                        height: { min: 480, ideal: 1080, max: 1080 },
                        advanced: [{ zoom: 1.5 }] // 尝试放大
                    }
                };

                await html5QrCode.start(
                    selectedCamera.id,
                    config,
                    onSuccess,
                    onError
                );

                isScanning = true;
                loading.style.display = 'none';
                console.log('扫描已启动');

            } catch (err) {
                console.error('启动失败:', err);
                
                // 备用方案：降低要求
                try {
                    html5QrCode = new Html5Qrcode("reader");
                    await html5QrCode.start(
                        { facingMode: "environment" },
                        { 
                            fps: 10, 
                            qrbox: null,
                            videoConstraints: {
                                width: { ideal: 1280 },
                                height: { ideal: 720 }
                            }
                        },
                        onSuccess,
                        onError
                    );
                    isScanning = true;
                    loading.style.display = 'none';
                } catch (err2) {
                    loading.style.display = 'none';
                    alert('摄像头启动失败: ' + err2.message);
                    closeScan();
                }
            }
        }

        function onSuccess(decodedText, decodedResult) {
            // 防止重复识别
            if (decodedText === lastResult) return;
            lastResult = decodedText;
            
            console.log('识别成功:', decodedText);
            
            // 显示状态
            statusToast.classList.add('show');
            
            // 填充输入框
            resultInput.value = decodedText;
            
            // 震动反馈
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            
            // 延迟后关闭
            setTimeout(() => {
                statusToast.classList.remove('show');
                alert('识别结果：\n\n' + decodedText);
                closeScan();
            }, 500);
        }

        function onError(errorMessage) {
            // 静默处理，持续扫描
        }

        async function closeScan() {
            scanModal.classList.remove('active');
            lastResult = '';
            
            if (html5QrCode && isScanning) {
                try {
                    await html5QrCode.stop();
                    html5QrCode.clear();
                } catch (e) {}
                isScanning = false;
            }
        }

        scanBtn.addEventListener('click', startScan);
        closeBtn.addEventListener('click', closeScan);
        
        // 点击背景关闭
        scanModal.addEventListener('click', (e) => {
            if (e.target === scanModal) closeScan();
        });

        // 页面隐藏时停止
        document.addEventListener('visibilitychange', () => {
            if (document.hidden && isScanning) {
                closeScan();
            }
        });
    </script>
</body>
</html>
